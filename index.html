<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Airsent Flight Console</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="login-page-body">

  <!-- BOOT SCREEN -->
  <div id="bootOverlay" class="boot-overlay hidden">
    <div class="boot-panel">
      <img src="logo.png" alt="Airsent logo" class="boot-logo" />

      <div class="boot-title">FLIGHT CONSOLE</div>
      <div class="boot-subtitle">SYSTEM INITIALIZATION</div>

      <div class="boot-status-list">
        <div class="boot-status-row"><span>AUTHENTICATION</span><b id="bootStep1">PENDING</b></div>
        <div class="boot-status-row"><span>MODE PROFILE</span><b id="bootStep2">PENDING</b></div>
        <div class="boot-status-row"><span>UI SYSTEMS</span><b id="bootStep3">PENDING</b></div>
        <div class="boot-status-row"><span>TELEMETRY BUS</span><b id="bootStep4">PENDING</b></div>
        <div class="boot-status-row"><span>MISSION CONSOLE</span><b id="bootStep5">PENDING</b></div>
      </div>

      <div class="boot-progress-wrap">
        <div class="boot-progress-bar">
          <div id="bootProgressFill" class="boot-progress-fill"></div>
        </div>
      </div>

      <div id="bootMessage" class="boot-message">
        Starting secure session...
      </div>
    </div>
  </div>

  <!-- LOGIN -->
  <main class="login-shell">

    <!-- LOGO ABOVE BOX -->
    <div class="login-logo-wrap">
      <img src="logo.png" alt="Airsent logo" class="login-top-logo" />
    </div>

    <!-- LOGIN PANEL -->
    <section class="login-panel">

      <div class="login-title">FLIGHT CONSOLE</div>

      <div class="login-form">

        <div class="login-field">
          <label>USERNAME</label>
          <input type="text" id="username" placeholder="demo / actual" autocomplete="off" />
        </div>

        <div class="login-field">
          <label>PASSWORD</label>
          <input type="password" id="password" placeholder="••••••" />
        </div>

        <button id="loginBtn" class="login-submit-btn">
          ACCESS SYSTEM
        </button>

        <div id="errorMsg" class="login-error-msg">
          INVALID CREDENTIALS
        </div>

        <div class="login-footer-text">
          AIRSENT FLIGHT SYSTEM INTERFACE
        </div>

      </div>
    </section>
  </main>

  <script>
    const loginBtn = document.getElementById("loginBtn");
    const usernameEl = document.getElementById("username");
    const passwordEl = document.getElementById("password");
    const errorMsg = document.getElementById("errorMsg");

    const bootOverlay = document.getElementById("bootOverlay");
    const bootProgressFill = document.getElementById("bootProgressFill");
    const bootMessage = document.getElementById("bootMessage");

    const bootSteps = [
      document.getElementById("bootStep1"),
      document.getElementById("bootStep2"),
      document.getElementById("bootStep3"),
      document.getElementById("bootStep4"),
      document.getElementById("bootStep5")
    ];

    let selectedMode = null;

    function showError(msg){
      errorMsg.textContent = msg;
      errorMsg.classList.add("visible");
    }

    function hideError(){
      errorMsg.classList.remove("visible");
    }

    function validateLogin(){
      const username = usernameEl.value.trim().toLowerCase();
      const password = passwordEl.value.trim();

      hideError();

      if(password !== "123456"){
        showError("INVALID PASSWORD");
        return false;
      }

      if(username === "demo"){
        selectedMode = "demo";
        return true;
      }

      if(username === "actual"){
        selectedMode = "real";
        return true;
      }

      showError("USERNAME MUST BE DEMO OR ACTUAL");
      return false;
    }

    function runBootSequence(){
      localStorage.setItem("mode", selectedMode);

      bootOverlay.classList.remove("hidden");

      const messages = [
        "Verifying operator credentials...",
        `Loading ${selectedMode} environment...`,
        "Starting UI systems...",
        "Initializing telemetry...",
        "Launching console..."
      ];

      let step = 0;

      function next(){
        if(step < bootSteps.length){
          bootSteps[step].textContent = "ONLINE";
          bootSteps[step].classList.add("ok");

          bootMessage.textContent = messages[step];
          bootProgressFill.style.width = ((step+1)/bootSteps.length)*100 + "%";

          step++;
          setTimeout(next, 450);
        } else {
          bootMessage.textContent = "System ready. Redirecting...";
          setTimeout(() => {
            window.location.href = "index.html";
          }, 700);
        }
      }

      setTimeout(next, 300);
    }

    loginBtn.addEventListener("click", () => {
      if(validateLogin()){
        runBootSequence();
      }
    });

    passwordEl.addEventListener("keydown", (e)=>{
      if(e.key === "Enter"){
        if(validateLogin()){
          runBootSequence();
        }
      }
    });

    usernameEl.addEventListener("keydown", (e)=>{
      if(e.key === "Enter"){
        passwordEl.focus();
      }
    });
  </script>

</body>
</html>
