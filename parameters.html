<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Airsent — Parameters</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --bg0:#060c12; --bg1:#0a131c; --bg2:#0e1a26;
  --line:rgba(255,255,255,.06);
  --green:#4ade80; --amber:#fbbf24; --red:#f87171; --blue:#60a5fa;
  --muted:#4b6275; --text:#e2eaf0; --text2:#7a95a8;
}
body { height:100vh; overflow:hidden; background:var(--bg0); color:var(--text); font-family:'DM Sans',Arial,sans-serif; display:flex; flex-direction:column; }

/* Nav */
.logo-dropdown { position:relative; display:inline-block; }
.logo-dropdown-btn { background:transparent; border:none; padding:0; display:flex; align-items:center; cursor:pointer; }
.logo-dropdown-menu { display:none; position:absolute; top:calc(100% + 6px); left:0; min-width:210px; background:#0a131c; border:1px solid rgba(255,255,255,.08); border-radius:8px; overflow:hidden; z-index:9999; box-shadow:0 16px 48px rgba(0,0,0,.6); }
.logo-dropdown-menu a { display:block; padding:10px 14px; color:#c8dce8; text-decoration:none; font-size:12px; }
.logo-dropdown-menu a:hover { background:rgba(255,255,255,.05); color:#fff; }
.logo-dropdown:hover .logo-dropdown-menu, .logo-dropdown:focus-within .logo-dropdown-menu { display:block; }

/* Top bar */
.topbar { flex-shrink:0; height:44px; background:var(--bg1); border-bottom:1px solid var(--line); display:flex; align-items:center; padding:0 14px; gap:6px; }
.t-div { width:1px; height:18px; background:var(--line); margin:0 4px; }
.t-lbl { font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); }
.t-val { font-size:11px; font-weight:700; font-family:'DM Mono',monospace; }
.t-val.g{color:var(--green);} .t-val.a{color:var(--amber);} .t-val.r{color:var(--red);} .t-val.b{color:var(--blue);}
.t-right { margin-left:auto; display:flex; align-items:center; gap:6px; }

/* Search & toolbar */
.toolbar { flex-shrink:0; height:40px; background:var(--bg1); border-bottom:1px solid var(--line); display:flex; align-items:center; padding:0 12px; gap:8px; }
.search-wrap { position:relative; flex:1; max-width:320px; }
.search-input {
  width:100%; height:28px; background:var(--bg2); border:1px solid var(--line);
  border-radius:4px; color:var(--text); font-size:11px; padding:0 28px 0 10px;
  font-family:'DM Mono',monospace; outline:none;
}
.search-input::placeholder { color:var(--muted); }
.search-input:focus { border-color:rgba(96,165,250,.3); }
.search-clear { position:absolute; right:8px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--muted); cursor:pointer; font-size:12px; padding:0; }
.tb-btn {
  height:28px; padding:0 12px; border-radius:4px; border:1px solid var(--line);
  background:transparent; color:var(--text2); font-size:10px; letter-spacing:.8px;
  text-transform:uppercase; cursor:pointer; font-family:'DM Sans',Arial,sans-serif;
  transition:all .12s; white-space:nowrap;
}
.tb-btn:hover { background:rgba(255,255,255,.04); border-color:rgba(255,255,255,.15); color:var(--text); }
.tb-btn.active { background:rgba(96,165,250,.1); border-color:rgba(96,165,250,.35); color:var(--blue); }
.tb-btn.warn-btn { border-color:rgba(251,191,36,.25); color:var(--amber); }
.tb-btn.warn-btn:hover { background:rgba(251,191,36,.08); }
.tb-sep { width:1px; height:20px; background:var(--line); }
.modified-count { font-size:10px; color:var(--amber); font-family:'DM Mono',monospace; margin-left:4px; }

/* Body */
.body { flex:1; min-height:0; display:grid; grid-template-columns:180px 1fr 280px; gap:1px; background:var(--line); overflow:hidden; }

/* Category sidebar */
.sidebar { background:var(--bg0); display:flex; flex-direction:column; overflow:hidden; }
.sidebar-head { padding:8px 12px 6px; border-bottom:1px solid var(--line); font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); font-weight:700; flex-shrink:0; }
.cat-list { flex:1; overflow-y:auto; scrollbar-width:none; }
.cat-list::-webkit-scrollbar { display:none; }
.cat-item {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 12px; border-bottom:1px solid var(--line);
  cursor:pointer; transition:background .1s; gap:6px;
}
.cat-item:hover { background:rgba(255,255,255,.03); }
.cat-item.active { background:rgba(96,165,250,.08); border-left:2px solid var(--blue); }
.cat-name { font-size:11px; color:var(--text2); }
.cat-item.active .cat-name { color:var(--blue); font-weight:600; }
.cat-badge { font-size:9px; font-family:'DM Mono',monospace; color:var(--muted); background:var(--bg2); padding:1px 5px; border-radius:10px; }
.cat-item.active .cat-badge { background:rgba(96,165,250,.15); color:var(--blue); }
.cat-mod { font-size:8px; color:var(--amber); font-weight:700; }

/* Params table */
.params-area { background:var(--bg0); display:flex; flex-direction:column; overflow:hidden; }
.params-table-head {
  display:grid; grid-template-columns:220px 100px 100px 1fr 80px;
  gap:0; padding:6px 14px; border-bottom:1px solid var(--line);
  background:var(--bg1); flex-shrink:0;
}
.th { font-size:9px; letter-spacing:1px; text-transform:uppercase; color:var(--muted); font-weight:700; }
.params-rows { flex:1; overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--line) transparent; }
.params-rows::-webkit-scrollbar { width:3px; }
.params-rows::-webkit-scrollbar-thumb { background:var(--bg2); }

.param-row {
  display:grid; grid-template-columns:220px 100px 100px 1fr 80px;
  gap:0; padding:0 14px; border-bottom:1px solid var(--line);
  align-items:center; min-height:36px; cursor:pointer; transition:background .1s;
}
.param-row:hover { background:rgba(255,255,255,.02); }
.param-row.selected { background:rgba(96,165,250,.07); }
.param-row.modified { border-left:2px solid var(--amber); }
.param-row.modified .pv-current { color:var(--amber); }

.pv-name { font-size:10px; font-family:'DM Mono',monospace; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.pv-default { font-size:10px; font-family:'DM Mono',monospace; color:var(--muted); }
.pv-current { font-size:11px; font-family:'DM Mono',monospace; font-weight:700; color:var(--text); }
.pv-desc { font-size:10px; color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding-left:8px; }
.pv-unit { font-size:9px; color:var(--muted); font-family:'DM Mono',monospace; text-align:right; }

/* Detail panel */
.detail { background:var(--bg0); display:flex; flex-direction:column; overflow:hidden; }
.detail-head { padding:10px 14px 8px; border-bottom:1px solid var(--line); flex-shrink:0; }
.detail-title { font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--text); }
.detail-empty { flex:1; display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:11px; }

.detail-body { flex:1; overflow-y:auto; padding:14px; scrollbar-width:none; }
.detail-body::-webkit-scrollbar { display:none; }

.d-param-name { font-size:16px; font-family:'DM Mono',monospace; font-weight:700; color:var(--blue); margin-bottom:4px; }
.d-param-desc { font-size:11px; color:var(--text2); line-height:1.5; margin-bottom:14px; }

.d-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; gap:8px; }
.d-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; }
.d-val { font-size:12px; font-family:'DM Mono',monospace; font-weight:700; color:var(--text); }

.d-input-wrap { margin-top:16px; }
.d-input-label { font-size:9px; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
.d-input {
  width:100%; height:36px; background:var(--bg2); border:1px solid rgba(255,255,255,.1);
  border-radius:5px; color:var(--text); font-size:14px; font-family:'DM Mono',monospace;
  padding:0 12px; outline:none; font-weight:700;
}
.d-input:focus { border-color:rgba(96,165,250,.4); }
.d-input.changed { border-color:rgba(251,191,36,.4); color:var(--amber); }

.d-range { margin-top:6px; font-size:9px; color:var(--muted); display:flex; justify-content:space-between; }

.d-actions { margin-top:16px; display:flex; gap:8px; }
.d-btn {
  flex:1; height:32px; border-radius:5px; border:1px solid; font-size:10px;
  font-weight:700; letter-spacing:.8px; text-transform:uppercase;
  cursor:pointer; font-family:'DM Sans',Arial,sans-serif; transition:all .12s;
}
.d-btn-set { background:rgba(74,222,128,.1); border-color:rgba(74,222,128,.4); color:var(--green); }
.d-btn-set:hover { background:rgba(74,222,128,.2); }
.d-btn-reset { background:transparent; border-color:var(--line); color:var(--text2); }
.d-btn-reset:hover { background:rgba(255,255,255,.04); }

.d-options { margin-top:14px; }
.d-option {
  display:flex; align-items:center; padding:6px 10px; border-radius:4px;
  border:1px solid var(--line); margin-bottom:4px; cursor:pointer;
  font-size:11px; color:var(--text2); transition:all .1s; gap:8px;
}
.d-option:hover { background:rgba(255,255,255,.03); border-color:rgba(255,255,255,.12); }
.d-option.selected { background:rgba(96,165,250,.08); border-color:rgba(96,165,250,.3); color:var(--blue); }
.d-option-val { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); margin-left:auto; }

.d-divider { height:1px; background:var(--line); margin:12px 0; }
.d-note { font-size:10px; color:var(--muted); line-height:1.5; padding:8px; background:rgba(251,191,36,.04); border:1px solid rgba(251,191,36,.1); border-radius:4px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo-dropdown">
    <button class="logo-dropdown-btn"><img src="logo.png" style="height:24px;" alt="Airsent"></button>
    <div class="logo-dropdown-menu">
      <a href="dashboard.html">Main Dashboard</a>
      <a href="mission.html">Mission Planner</a>
      <a href="preflight.html">Pre-Flight Checklist</a>
      <a href="parameters.html">Parameters</a>
      <a href="logs.html">Flight Logs</a>
      <a href="launch.html">Launch Sequencer</a>
      <a href="health.html">System Health</a>
      <a href="sensor-status.html">Sensor Status</a>
      <a href="actuators.html">Actuators</a>
    </div>
  </div>
  <div class="t-div"></div>
  <span style="font-size:9px;letter-spacing:3px;font-weight:700;color:var(--green);text-transform:uppercase;">Parameters</span>
  <div class="t-div"></div>
  <span class="t-lbl">Total</span>&nbsp;<span class="t-val b" id="hTotal">--</span>
  <div class="t-div"></div>
  <span class="t-lbl">Modified</span>&nbsp;<span class="t-val a" id="hModified">0</span>
  <div class="t-div"></div>
  <span class="t-lbl">Vehicle</span>&nbsp;<span class="t-val g" id="hVehicle">ArduCopter</span>
  <div class="t-right">
    <span class="t-val" style="color:var(--muted)" id="hClock">--:--:--</span>
  </div>
</div>

<div class="toolbar">
  <div class="search-wrap">
    <input class="search-input" id="searchInput" placeholder="Search parameters..." autocomplete="off">
    <button class="search-clear" id="searchClear">✕</button>
  </div>
  <div class="tb-sep"></div>
  <button class="tb-btn active" id="btnAll">All</button>
  <button class="tb-btn" id="btnModified">Modified <span class="modified-count" id="modCount">0</span></button>
  <div class="tb-sep"></div>
  <button class="tb-btn warn-btn" id="btnWriteAll">Write All to Vehicle</button>
  <button class="tb-btn" id="btnSaveFile">Save to File</button>
  <button class="tb-btn" id="btnLoadFile">Load from File</button>
  <button class="tb-btn" id="btnResetMod">Reset Modified</button>
</div>

<div class="body">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-head">Categories</div>
    <div class="cat-list" id="catList"></div>
  </div>

  <!-- Params -->
  <div class="params-area">
    <div class="params-table-head">
      <span class="th">Parameter</span>
      <span class="th">Default</span>
      <span class="th">Current</span>
      <span class="th" style="padding-left:8px">Description</span>
      <span class="th" style="text-align:right">Unit</span>
    </div>
    <div class="params-rows" id="paramsRows"></div>
  </div>

  <!-- Detail -->
  <div class="detail">
    <div class="detail-head"><div class="detail-title">Parameter Detail</div></div>
    <div class="detail-empty" id="detailEmpty">Select a parameter to edit</div>
    <div class="detail-body" id="detailBody" style="display:none"></div>
  </div>

</div>

  { name:'FLTMODE4',       cat:'Flight Modes',def:5,     unit:'',     range:[0,27],    desc:'Flight mode for RC channel 5 position 4.' },
  { name:'FLTMODE5',       cat:'Flight Modes',def:6,     unit:'',     range:[0,27],    desc:'Flight mode for RC channel 5 position 5.' },
  { name:'FLTMODE6',       cat:'Flight Modes',def:9,     unit:'',     range:[0,27],    desc:'Flight mode for RC channel 5 position 6.' },
  // Speed / Nav
  { name:'WPNAV_SPEED',    cat:'Navigation',  def:500,   unit:'cm/s', range:[20,2000], desc:'Horizontal speed for AUTO/GUIDED mode waypoint navigation.' },
  { name:'WPNAV_SPEED_UP', cat:'Navigation',  def:250,   unit:'cm/s', range:[10,1000], desc:'Maximum climb speed in AUTO mode.' },
  { name:'WPNAV_SPEED_DN', cat:'Navigation',  def:150,   unit:'cm/s', range:[10,500],  desc:'Maximum descent speed in AUTO mode.' },
  { name:'WPNAV_ACCEL',    cat:'Navigation',  def:250,   unit:'cm/s²',range:[50,500],  desc:'Horizontal acceleration used in AUTO/GUIDED modes.' },
  { name:'RTL_ALT',        cat:'Navigation',  def:1500,  unit:'cm',   range:[200,8000],desc:'Return to launch altitude. Vehicle climbs to this before returning.' },
  { name:'RTL_SPEED',      cat:'Navigation',  def:0,     unit:'cm/s', range:[0,2000],  desc:'RTL horizontal speed. 0=use WPNAV_SPEED.' },
  { name:'LAND_SPEED',     cat:'Navigation',  def:50,    unit:'cm/s', range:[20,200],  desc:'Descent speed during final landing phase.' },
  // RC
  { name:'RC_SPEED',       cat:'RC',          def:490,   unit:'Hz',   range:[50,490],  desc:'PWM refresh rate for servos/ESCs.' },
  { name:'RC_FEEL_RP',     cat:'RC',          def:25,    unit:'',     range:[0,100],   desc:'RC feel for roll/pitch. 25=relaxed, 100=crisp.' },
  { name:'RCMAP_ROLL',     cat:'RC',          def:1,     unit:'',     range:[1,8],     desc:'RC input channel mapped to roll.' },
  { name:'RCMAP_PITCH',    cat:'RC',          def:2,     unit:'',     range:[1,8],     desc:'RC input channel mapped to pitch.' },
  { name:'RCMAP_THROTTLE', cat:'RC',          def:3,     unit:'',     range:[1,8],     desc:'RC input channel mapped to throttle.' },
  { name:'RCMAP_YAW',      cat:'RC',          def:4,     unit:'',     range:[1,8],     desc:'RC input channel mapped to yaw.' },
  // Logging
  { name:'LOG_BITMASK',    cat:'Logging',     def:176126,unit:'',     range:[0,65535], desc:'Bitmask of what data to log. Default logs attitude, GPS, motors, RC.' },
  { name:'LOG_DISARMED',   cat:'Logging',     def:0,     unit:'',     range:[0,1],     desc:'Log while disarmed.', options:[{val:0,label:'Disabled'},{val:1,label:'Enabled'}] },
  { name:'LOG_REPLAY',     cat:'Logging',     def:0,     unit:'',     range:[0,1],     desc:'Enable EKF replay logging for post-flight analysis.' },
  // Battery Monitor
  { name:'BATT_MONITOR',   cat:'Battery',     def:4,     unit:'',     range:[0,15],    desc:'Battery monitoring type. 4=Analog Volt+Current.', options:[{val:0,label:'Disabled'},{val:3,label:'Voltage only'},{val:4,label:'Volt+Current'}] },
  { name:'BATT_CAPACITY',  cat:'Battery',     def:3300,  unit:'mAh',  range:[0,100000],desc:'Battery capacity in mAh. Used for remaining capacity calculation.' },
  { name:'BATT_LOW_VOLT',  cat:'Battery',     def:10.5,  unit:'V',    range:[0,25],    desc:'Low voltage warning threshold.' },
  { name:'BATT_CRT_VOLT',  cat:'Battery',     def:9.6,   unit:'V',    range:[0,25],    desc:'Critical voltage. Triggers emergency land.' },
  { name:'BATT_LOW_MAH',   cat:'Battery',     def:600,   unit:'mAh',  range:[0,10000], desc:'Low capacity warning (mAh remaining). 0=disabled.' },
];

// State
const paramValues = {};
PARAMS.forEach(p => { paramValues[p.name] = p.def; });
let selectedParam = null;
let activeFilter = 'all'; // all | modified
let searchQuery = '';
let activeCat = null;

// Categories
const CATS = [...new Set(PARAMS.map(p => p.cat))];

function el(id) { return document.getElementById(id); }
function pad(n) { return String(n).padStart(2,"0"); }
function now()  { const d=new Date(); return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`; }

function isModified(p) { return paramValues[p.name] !== p.def; }
function modifiedCount() { return PARAMS.filter(isModified).length; }

function filteredParams() {
  return PARAMS.filter(p => {
    if (activeCat && p.cat !== activeCat) return false;
    if (activeFilter === 'modified' && !isModified(p)) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      return p.name.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q) || p.cat.toLowerCase().includes(q);
    }
    return true;
  });
}

// ── Render sidebar ────────────────────────────────────────
function renderSidebar() {
  const list = el('catList');
  list.innerHTML = '';
  // All
  const allItem = document.createElement('div');
  allItem.className = 'cat-item' + (!activeCat ? ' active' : '');
  allItem.innerHTML = `<span class="cat-name">All Parameters</span><span class="cat-badge">${PARAMS.length}</span>`;
  allItem.addEventListener('click', () => { activeCat=null; renderSidebar(); renderParams(); });
  list.appendChild(allItem);

  CATS.forEach(cat => {
    const count = PARAMS.filter(p => p.cat===cat).length;
    const mods  = PARAMS.filter(p => p.cat===cat && isModified(p)).length;
    const item = document.createElement('div');
    item.className = 'cat-item' + (activeCat===cat ? ' active' : '');
    item.innerHTML = `<span class="cat-name">${cat}</span><span class="cat-badge">${count}</span>${mods>0?`<span class="cat-mod">+${mods}</span>`:''}`;
    item.addEventListener('click', () => { activeCat=cat; renderSidebar(); renderParams(); });
    list.appendChild(item);
  });
}

// ── Render params ─────────────────────────────────────────
function renderParams() {
  const rows = el('paramsRows');
  rows.innerHTML = '';
  const list = filteredParams();

  list.forEach(p => {
    const val = paramValues[p.name];
    const mod = isModified(p);
    const row = document.createElement('div');
    row.className = 'param-row' + (selectedParam===p.name?' selected':'') + (mod?' modified':'');
    row.innerHTML = `
      <span class="pv-name">${p.name}</span>
      <span class="pv-default">${p.def}</span>
      <span class="pv-current">${Number.isInteger(val)?val:parseFloat(val.toFixed(4))}</span>
      <span class="pv-desc">${p.desc}</span>
      <span class="pv-unit">${p.unit||''}</span>`;
    row.addEventListener('click', () => { selectedParam=p.name; renderParams(); renderDetail(); });
    rows.appendChild(row);
  });

  el('hTotal').textContent = PARAMS.length;
  const mc = modifiedCount();
  el('hModified').textContent = mc;
  el('modCount').textContent = mc;
}

// ── Render detail ─────────────────────────────────────────
function renderDetail() {
  const param = PARAMS.find(p => p.name === selectedParam);
  el('detailEmpty').style.display = param ? 'none' : 'flex';
  const body = el('detailBody');
  body.style.display = param ? 'block' : 'none';
  if (!param) return;

  const val = paramValues[param.name];
  const mod = isModified(param);

  let html = `
    <div class="d-param-name">${param.name}</div>
    <div class="d-param-desc">${param.desc}</div>
    <div class="d-row"><span class="d-label">Category</span><span class="d-val">${param.cat}</span></div>
    <div class="d-row"><span class="d-label">Default</span><span class="d-val" style="color:var(--muted)">${param.def}${param.unit?' '+param.unit:''}</span></div>
    <div class="d-row"><span class="d-label">Current</span><span class="d-val" style="color:${mod?'var(--amber)':'var(--text)'}">${val}${param.unit?' '+param.unit:''}</span></div>
    <div class="d-row"><span class="d-label">Range</span><span class="d-val" style="color:var(--muted)">${param.range[0]} – ${param.range[1]}</span></div>
    <div class="d-divider"></div>`;

  if (param.options) {
    html += `<div class="d-options">`;
    param.options.forEach(opt => {
      html += `<div class="d-option${val===opt.val?' selected':''}" data-val="${opt.val}"><span>${opt.label}</span><span class="d-option-val">${opt.val}</span></div>`;
    });
    html += `</div>`;
  }

  html += `
    <div class="d-input-wrap">
      <div class="d-input-label">Set Value${param.unit?' ('+param.unit+')':''}</div>
      <input class="d-input${mod?' changed':''}" id="dInput" type="number" value="${val}" min="${param.range[0]}" max="${param.range[1]}" step="${param.range[1]-param.range[0] < 2 ? 0.001 : 1}">
      <div class="d-range"><span>Min: ${param.range[0]}</span><span>Max: ${param.range[1]}</span></div>
    </div>
    <div class="d-actions">
      <button class="d-btn d-btn-set" id="dBtnSet">Set Value</button>
      <button class="d-btn d-btn-reset" id="dBtnReset">Reset Default</button>
    </div>`;

  if (mod) html += `<div class="d-divider"></div><div class="d-note">⚠ This value differs from default (${param.def}). Write to vehicle to apply changes.</div>`;

  body.innerHTML = html;

  // Option click
  body.querySelectorAll('.d-option').forEach(opt => {
    opt.addEventListener('click', () => {
      paramValues[param.name] = parseFloat(opt.dataset.val);
      renderDetail(); renderParams(); renderSidebar();
    });
  });

  // Input change
  const input = el('dInput');
  if (input) {
    input.addEventListener('input', () => {
      input.classList.toggle('changed', parseFloat(input.value) !== param.def);
    });
  }

  // Set button
  const setBt = el('dBtnSet');
  if (setBt) setBt.addEventListener('click', () => {
    const v = parseFloat(el('dInput')?.value);
    if (!isNaN(v) && v >= param.range[0] && v <= param.range[1]) {
      paramValues[param.name] = v;
      renderDetail(); renderParams(); renderSidebar();
    } else {
      el('dInput').style.borderColor = 'var(--red)';
      setTimeout(() => { if(el('dInput')) el('dInput').style.borderColor=''; }, 1000);
    }
  });

  // Reset button
  const rstBt = el('dBtnReset');
  if (rstBt) rstBt.addEventListener('click', () => {
    paramValues[param.name] = param.def;
    renderDetail(); renderParams(); renderSidebar();
  });
}

// ── Toolbar ───────────────────────────────────────────────
el('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  activeCat = null;
  renderSidebar(); renderParams();
});
el('searchClear').addEventListener('click', () => {
  el('searchInput').value = '';
  searchQuery = '';
  renderSidebar(); renderParams();
});
el('btnAll').addEventListener('click', () => {
  activeFilter='all'; el('btnAll').classList.add('active'); el('btnModified').classList.remove('active');
  renderParams();
});
el('btnModified').addEventListener('click', () => {
  activeFilter='modified'; el('btnModified').classList.add('active'); el('btnAll').classList.remove('active');
  renderParams();
});
el('btnResetMod').addEventListener('click', () => {
  if (!confirm('Reset all modified parameters to defaults?')) return;
  PARAMS.forEach(p => { paramValues[p.name] = p.def; });
  selectedParam = null;
  renderSidebar(); renderParams(); renderDetail();
});
el('btnSaveFile').addEventListener('click', () => {
  const lines = PARAMS.map(p => `${p.name}\t${paramValues[p.name]}`).join('\n');
  const blob = new Blob([lines], {type:'text/plain'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='params.param'; a.click();
});
el('btnLoadFile').addEventListener('click', () => {
  const input = document.createElement('input'); input.type='file'; input.accept='.param,.txt';
  input.addEventListener('change', e => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      ev.target.result.split('\n').forEach(line => {
        const [name, val] = line.trim().split(/\s+/);
        if (name && val && paramValues[name] !== undefined) paramValues[name] = parseFloat(val);
      });
      renderSidebar(); renderParams(); renderDetail();
    };
    reader.readAsText(file);
  });
  input.click();
});
el('btnWriteAll').addEventListener('click', () => {
  const mc = modifiedCount();
  if (mc === 0) { alert('No modified parameters to write.'); return; }
  alert(`Write ${mc} modified parameter(s) to vehicle.\n\nNote: In actual mode this would send MAVLink PARAM_SET messages.\nRestart the vehicle after writing critical parameters.`);
});

// ── Init ──────────────────────────────────────────────────
setInterval(() => el('hClock').textContent = now(), 1000);
renderSidebar();
renderParams();
</script>
</body>
</html>
